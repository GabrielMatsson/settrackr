name: Keep backend awake

# Backup pinger: Render's free tier spins the backend down after 15 idle
# minutes (cold boot 30-60s). UptimeRobot (5-min interval) is the primary
# keep-alive; GitHub cron can drift several minutes under load, so this is
# the belt-and-suspenders fallback. 24/7 awake uses ~720 of Render's 750
# free instance-hours per month.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend root
        run: |
          curl -fsS --max-time 90 --retry 2 https://settrackr.onrender.com/ > /dev/null
          echo "Backend is awake"
