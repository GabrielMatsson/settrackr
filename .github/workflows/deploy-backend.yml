name: Deploy backend to Render

on:
  push:
    branches: [main]
    paths:
      - "server/**"
  workflow_dispatch: {}

jobs:
  trigger-render-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK secret is not set"
            exit 1
          fi
          response=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_DEPLOY_HOOK }}")
          echo "Render responded with HTTP $response"
          if [ "$response" -ge 400 ]; then
            echo "::error::Deploy hook call failed (HTTP $response)"
            exit 1
          fi
